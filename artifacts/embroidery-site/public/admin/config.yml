backend:
  name: git-gateway
  branch: main
  identity_url: https://embroideryandthreads.netlify.app/.netlify/identity
  gateway_url: https://embroideryandthreads.netlify.app/.netlify/git/github

site_url: https://embroideryandthreads.com
display_url: https://embroideryandthreads.com
logo_url: https://embroideryandthreads.com/logo-b.jpg?v=20260720-cache1
media_folder: artifacts/embroidery-site/public/uploads
public_folder: /uploads
publish_mode: simple

collections:
  - label: Website
    name: website
    editor:
      preview: false
    files:
      - label: Page Photos & Galleries
        name: site_content
        file: artifacts/embroidery-site/src/content/site.json
        format: json
        fields:
          - label: Hero Image
            name: hero
            widget: object
            fields:
              - { label: Image, name: image, widget: image, hint: "Drag in a JPG, PNG, or WebP image. Use an original photo at least 1200px wide and no larger than 12 MB." }
              - { label: Image Description, name: alt, widget: string, hint: "Briefly describe the visible product, wording, and colors for accessibility and search." }
          - label: Story Image
            name: story
            widget: object
            fields:
              - { label: Image, name: image, widget: image, hint: "Use an original JPG, PNG, or WebP photo at least 1200px wide and no larger than 12 MB." }
              - { label: Image Description, name: alt, widget: string, hint: "Briefly describe the visible product, wording, and colors." }
          - label: Photo Galleries
            name: gallery
            widget: list
            min: 6
            max: 6
            summary: "{{fields.name}}"
            hint: "Keep all six galleries. You can rename a gallery and add, remove, or reorder its photos. The first photo is used as the gallery cover."
            fields:
              - { label: Gallery Name, name: name, widget: string }
              - label: Gallery Photos
                name: images
                widget: list
                min: 1
                summary: "{{fields.alt}}"
                hint: "Drag photos to reorder them. The first photo becomes the cover shown on the home page."
                fields:
                  - { label: Image, name: image, widget: image, hint: "Use an original JPG, PNG, or WebP photo at least 1200px wide and no larger than 12 MB." }
                  - { label: Image Description, name: alt, widget: string, hint: "Briefly describe the visible product, wording, and colors. Do not write 'image of.'" }
          - { label: Customer Stories, name: reviews, widget: hidden }
          - { label: Instagram Highlights, name: instagram, widget: hidden }
      - label: Price List
        name: price_list
        file: artifacts/embroidery-site/src/content/pricing.json
        format: json
        fields:
          - { label: Small Heading, name: eyebrow, widget: string }
          - { label: Page Title, name: title, widget: string }
          - { label: Introduction, name: intro, widget: text }
          - { label: Pricing Disclaimer, name: disclaimer, widget: text, hint: "Explain why a final quote may differ from a starting price." }
          - { label: Sales Tax Note, name: taxNote, widget: text }
          - label: Price Categories
            name: categories
            widget: list
            min: 7
            max: 7
            summary: "{{fields.name}}"
            hint: "Keep all seven categories. Open a category to update item names, prices, and optional details."
            fields:
              - { label: Category Name, name: name, widget: string }
              - label: Price Items
                name: items
                widget: list
                min: 1
                summary: "{{fields.name}} - {{fields.price}}"
                fields:
                  - { label: Item or Service, name: name, widget: string }
                  - { label: Starting Price, name: price, widget: string, hint: "Examples: $32, $15-$35, +$12, or Custom pricing" }
                  - { label: Optional Details, name: note, widget: string, required: false }
