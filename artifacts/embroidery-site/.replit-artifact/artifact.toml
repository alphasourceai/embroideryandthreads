kind = "web"
previewPath = "/"
title = "Embroidery & Threads"
version = "1.0.0"
id = "artifacts/embroidery-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24537

[services.development]
run = "pnpm --filter @workspace/embroidery-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/embroidery-site", "run", "build" ]
publicDir = "artifacts/embroidery-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24537"
BASE_PATH = "/"
