name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/embroidery-site qa
      - run: pnpm --filter @workspace/embroidery-site exec playwright install --with-deps chromium
      - run: pnpm --filter @workspace/embroidery-site test:e2e
      - run: pnpm audit --audit-level=high
