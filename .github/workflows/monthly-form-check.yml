name: Monthly Form Delivery Check

on:
  workflow_dispatch:
  schedule:
    - cron: "23 15 1 * *"

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const title = "Monthly contact form delivery check";
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            if (existing.some((issue) => issue.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                "Submit one test inquiry at https://embroideryandthreads.com/#contact.",
                "",
                "Confirm it appears in Netlify Forms and reaches the configured notification address.",
                "Confirm the reply workflow works, then close this issue.",
              ].join("\n"),
              labels: [],
            });
