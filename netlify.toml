[build]
  command = "PORT=4173 BASE_PATH=/ pnpm --filter @workspace/embroidery-site build"
  publish = "artifacts/embroidery-site/dist/public"

[build.environment]
  NODE_VERSION = "24"
  VITE_NETLIFY_IMAGE_CDN = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
