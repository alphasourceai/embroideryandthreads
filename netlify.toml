[build]
  command = "PORT=4173 BASE_PATH=/ pnpm --filter @workspace/embroidery-site build"
  publish = "artifacts/embroidery-site/dist/public"

[build.environment]
  NODE_VERSION = "24"
  VITE_NETLIFY_IMAGE_CDN = "true"

[[redirects]]
  from = "/reviews"
  to = "/reviews.html"
  status = 200

[[redirects]]
  from = "/reviews/"
  to = "/reviews.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/privacy/"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), geolocation=(), microphone=(), payment=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self' https://cloudflareinsights.com https://*.netlify.app https://*.netlify.com https://api.netlify.com https://api.github.com; font-src 'self' https://fonts.gstatic.com data:; form-action 'self'; frame-ancestors 'none'; frame-src 'self' https://*.netlify.com https://*.netlify.app; img-src 'self' data: blob: https:; manifest-src 'self'; media-src 'self' blob:; object-src 'none'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; worker-src 'self' blob:; upgrade-insecure-requests"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self' https://*.netlify.app https://*.netlify.com https://api.netlify.com https://api.github.com; font-src 'self' https://fonts.gstatic.com data:; form-action 'self'; frame-ancestors 'none'; frame-src 'self' https://*.netlify.com https://*.netlify.app; img-src 'self' data: blob: https:; manifest-src 'self'; media-src 'self' blob:; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; worker-src 'self' blob:; upgrade-insecure-requests"

[[headers]]
  for = "/404.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
